<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Extractor</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">

    <style>
        @font-face {
            font-family: 'Coverface_SE';
            src: url('Coverface_SE.ttf') format('truetype');
        }

        :root {
            --bg: #09090e;
            --surface: rgba(25, 25, 32, 0.85);
            --border: rgba(255, 255, 255, 0.15);
            --accent-1: #00f2fe;
            --accent-2: #4facfe;
            --text-main: #ffffff;
            --text-muted: #8b8b9e;
            --scrollbar-bg: #1a1a24;
            --scrollbar-thumb: #3a3a4a;
            --icon-color: #ffffff;
            --shadow: rgba(0, 0, 0, 0.8);
            --btn-text: #ffffff;
            --btn-sec-bg: rgba(255,255,255,0.1);
            --btn-sec-text: #ffffff;
        }

        .light-theme {
            --bg: #e8e8ed;
            --surface: rgba(255, 255, 255, 0.95);
            --border: rgba(0, 0, 0, 0.15);
            --accent-1: #007aff;
            --accent-2: #005be2;
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --scrollbar-bg: #e5e5ea;
            --scrollbar-thumb: #a1a1a6;
            --icon-color: #1d1d1f;
            --shadow: rgba(0, 0, 0, 0.15);
            --btn-text: #ffffff;
            --btn-sec-bg: rgba(0,0,0,0.06);
            --btn-sec-text: #1d1d1f;
        }

        ::-webkit-scrollbar { width: 10px; background-color: var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb { background-color: var(--scrollbar-thumb); border-radius: 5px; border: 2px solid var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb:hover { background-color: var(--accent-1); }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            transition: background-color 0.3s, color 0.3s;
            /* Prevent pull-to-refresh on mobile */
            overscroll-behavior: none;
        }

        .bg-orbs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; z-index: -1; pointer-events: none;
        }

        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px);
            animation: float 10s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(0, 242, 254, 0.15); top: -100px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(79, 172, 254, 0.15); bottom: -150px; right: -100px; animation-delay: -5s; }

        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(50px) scale(1.1); } }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            cursor: pointer;
            width: 50px;
            height: 50px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50%;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow);
        }
        .theme-toggle:hover {
            border-color: var(--accent-1);
            transform: scale(1.1);
        }
        .theme-toggle svg {
            width: 22px;
            height: 22px;
            stroke: var(--icon-color);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s ease;
        }

        .glass-container {
            background: var(--surface); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 24px; padding: 40px;
            width: 100%; max-width: 800px;
            box-shadow: 0 20px 50px var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; gap: 25px; z-index: 10;
            transition: background 0.3s, box-shadow 0.3s, border-color 0.3s;
        }

        h1 {
            font-size: 2.2rem; font-weight: 800; text-align: center;
            background: linear-gradient(to right, var(--text-main), #a5b4fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .upload-area {
            border: 2px dashed rgba(139, 139, 158, 0.4); border-radius: 16px; padding: 70px 20px;
            text-align: center; cursor: pointer; transition: all 0.4s; background: rgba(139, 139, 158, 0.05);
            position: relative;
        }
        .upload-area:hover { border-color: var(--accent-1); background: rgba(0, 242, 254, 0.05); }
        .upload-area input { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .workspace-wrapper {
            display: none; border-radius: 16px; overflow: hidden; border: 1px solid var(--border);
            box-shadow: 0 10px 30px var(--shadow); transition: opacity 0.3s;
        }
        #image-workspace { max-width: 100%; max-height: 550px; display: block; }

        .cropper-view-box, .cropper-face { border-radius: 8px; }
        .cropper-line { background-color: var(--accent-1) !important; }
        .cropper-point { background-color: #fff !important; width: 8px !important; height: 8px !important; border-radius: 50%; }

        .editor-wrapper {
            display: none; flex-direction: column; gap: 15px; animation: fadeIn 0.5s ease;
        }

        textarea {
            width: 100%;
            height: 300px;
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 15px; border-radius: 12px;
            font-family: inherit; font-size: 0.95rem; line-height: 1.5;
            resize: none;
            overflow-y: auto;
            outline: none; transition: all 0.3s;
        }
        .light-theme textarea { background: rgba(255, 255, 255, 0.5); }
        textarea:focus { border-color: var(--accent-1); background: rgba(0, 0, 0, 0.1); }
        .light-theme textarea:focus { background: #fff; }

        .progress-container { display: none; width: 100%; background: var(--border); border-radius: 8px; height: 6px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-2), var(--accent-1)); transition: width 0.3s ease; }
        .status-text { display: none; text-align: center; color: var(--accent-1); font-size: 0.85rem; font-weight: 600; margin-top: 10px; text-transform: uppercase; }

        .btn-glow {
            background: linear-gradient(135deg, var(--accent-2), var(--accent-1));
            color: var(--btn-text); border: none; padding: 16px 32px; border-radius: 14px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
            width: 100%; text-transform: uppercase; box-shadow: 0 8px 20px -8px var(--accent-2);
            touch-action: manipulation;
        }
        .btn-glow:hover { transform: translateY(-3px); box-shadow: 0 12px 25px -8px var(--accent-2); }
        .btn-glow:disabled { filter: grayscale(1); cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-secondary {
            background: var(--btn-sec-bg);
            color: var(--btn-sec-text);
            box-shadow: none;
        }
        .btn-secondary:hover {
            background: var(--border);
            box-shadow: none;
        }

        .result-wrapper {
            display: none; flex-direction: column; gap: 20px;
            border-top: 1px solid var(--border); padding-top: 30px; animation: fadeIn 0.8s ease;
        }

        .result-image-wrapper {
            padding: 5px;
            background: linear-gradient(135deg, #4facfe, #003399);
            border-radius: 8px;
            display: inline-block;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 51, 153, 0.3);
        }

        #result-preview { display: block; max-width: 100%; height: auto; border-radius: 4px; }

        .buttons-row {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        .buttons-row button {
            flex: 1;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            body { padding: 20px 15px; }
            .glass-container { padding: 25px; }
            h1 { font-size: 1.8rem; }
            .upload-area { padding: 40px 15px; }
            .upload-area h2 { font-size: 1.5rem; }
            .upload-area h3 { font-size: 1.2rem; }
            .workspace-wrapper { max-height: 400px; }
            textarea { height: 250px; }
            .theme-toggle { width: 44px; height: 44px; top: 15px; right: 15px; }
        }

        @media (max-width: 480px) {
            body { padding: 15px 10px; }
            .glass-container { padding: 20px; }
            h1 { font-size: 1.5rem; }
            .upload-area { padding: 30px 10px; }
            .upload-area h2 { font-size: 1.2rem; }
            .upload-area h3 { font-size: 1rem; }
            .workspace-wrapper { max-height: 300px; }
            textarea { height: 200px; font-size: 0.9rem; }
            .btn-glow { padding: 14px 20px; font-size: 0.9rem; }
            .buttons-row { gap: 10px; }
            .theme-toggle { width: 40px; height: 40px; }
        }

        @media (max-width: 400px) {
            .buttons-row { flex-direction: column; }
        }

        @media (max-width: 360px) {
            .glass-container { padding: 15px; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>

<div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
</div>

<div class="theme-toggle" id="theme-toggle" title="Переключить тему">
    <svg id="moon-icon" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
    </svg>
    <svg id="sun-icon" style="display:none;" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"></circle>
        <line x1="12" y1="1" x2="12" y2="3"></line>
        <line x1="12" y1="21" x2="12" y2="23"></line>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
        <line x1="1" y1="12" x2="3" y2="12"></line>
        <line x1="21" y1="12" x2="23" y2="12"></line>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
    </svg>
</div>

<div class="glass-container">
    <div>
        <h1>Neural Extractor</h1>
    </div>

    <div class="upload-area" id="upload-area">
        <h2 style="font-weight: 300; font-size: 2rem; margin-bottom: 10px;">+</h2>
        <h3 style="font-weight: 600;">Загрузить изображение</h3>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="workspace-wrapper" id="workspace-wrapper">
        <img id="image-workspace" src="" alt="Workspace">
    </div>

    <!-- Две кнопки под фото: Начать заново + Распознать -->
    <div class="buttons-row" id="crop-buttons" style="display: none;">
        <button class="btn-glow btn-secondary" id="restart-btn-crop">Начать заново</button>
        <button class="btn-glow" id="extract-btn">Распознать область</button>
    </div>

    <div>
        <div class="status-text" id="status-text">Инициализация ИИ...</div>
        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <div class="editor-wrapper" id="editor-wrapper">
        <h3 style="font-size: 1.1rem; text-align: center; font-weight: 600;">Проверьте и исправьте текст:</h3>
        <textarea id="text-editor" placeholder="Распознанный текст появится здесь..."></textarea>
        <div class="buttons-row">
            <button class="btn-glow btn-secondary" id="restart-btn-editor">Начать сначала</button>
            <button class="btn-glow" id="generate-btn">Превратить в фото</button>
        </div>
    </div>

    <canvas id="output-canvas" style="display:none;"></canvas>

    <div class="result-wrapper" id="result-wrapper">
        <h3 style="text-align: center; font-weight: 600;">Готовое изображение</h3>

        <div class="result-image-wrapper">
            <img id="result-preview" src="" alt="Результат">
        </div>

        <div class="buttons-row">
            <button class="btn-glow btn-secondary" id="restart-btn">Начать сначала</button>
            <button class="btn-glow" id="download-btn">Скачать фото</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<script>
    // Prevent F5 and Ctrl+R refresh
    window.addEventListener('keydown', function(e) {
        if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) {
            e.preventDefault();
            return false;
        }
    });

    const els = {
        fileInput: document.getElementById('file-input'),
        uploadArea: document.getElementById('upload-area'),
        workspaceWrapper: document.getElementById('workspace-wrapper'),
        imageWorkspace: document.getElementById('image-workspace'),
        extractBtn: document.getElementById('extract-btn'),
        cropButtons: document.getElementById('crop-buttons'),
        restartBtnCrop: document.getElementById('restart-btn-crop'),
        statusText: document.getElementById('status-text'),
        progressContainer: document.getElementById('progress-container'),
        progressBar: document.getElementById('progress-bar'),
        editorWrapper: document.getElementById('editor-wrapper'),
        textEditor: document.getElementById('text-editor'),
        generateBtn: document.getElementById('generate-btn'),
        resultWrapper: document.getElementById('result-wrapper'),
        resultPreview: document.getElementById('result-preview'),
        downloadBtn: document.getElementById('download-btn'),
        restartBtn: document.getElementById('restart-btn'),
        canvas: document.getElementById('output-canvas'),
        themeToggle: document.getElementById('theme-toggle'),
        moonIcon: document.getElementById('moon-icon'),
        sunIcon: document.getElementById('sun-icon'),
        body: document.body,
    };
    const ctx = els.canvas.getContext('2d');
    let cropper;

    // Тема
    els.themeToggle.addEventListener('click', () => {
        els.body.classList.toggle('light-theme');
        if (els.body.classList.contains('light-theme')) {
            els.moonIcon.style.display = 'none';
            els.sunIcon.style.display = 'block';
        } else {
            els.moonIcon.style.display = 'block';
            els.sunIcon.style.display = 'none';
        }
    });

    // Курсор на скроллбаре (для удобства)
    els.textEditor.addEventListener('mousemove', function(e) {
        const rect = this.getBoundingClientRect();
        const scrollbarWidth = this.offsetWidth - this.clientWidth;
        if (scrollbarWidth > 0 && e.clientX >= rect.right - scrollbarWidth) {
            this.style.cursor = 'pointer';
        } else {
            this.style.cursor = 'text';
        }
    });
    els.textEditor.addEventListener('mouseleave', function() {
        this.style.cursor = 'text';
    });

    window.addEventListener('mousemove', function(e) {
        const scrollbarWidth = window.innerWidth - document.documentElement.clientWidth;
        if (scrollbarWidth > 0 && e.clientX >= window.innerWidth - scrollbarWidth) {
            document.documentElement.style.cursor = 'pointer';
        } else {
            document.documentElement.style.cursor = '';
        }
    });

    // Загрузка изображения
    els.fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (event) => {
                els.uploadArea.style.display = 'none';
                els.workspaceWrapper.style.display = 'block';
                els.cropButtons.style.display = 'flex'; // показываем две кнопки
                els.imageWorkspace.src = event.target.result;

                if (cropper) cropper.destroy();
                cropper = new Cropper(els.imageWorkspace, {
                    viewMode: 2,
                    autoCropArea: 0.9,
                    background: false
                });
            };
            reader.readAsDataURL(file);
        }
    });

    // Кнопка "Начать заново" на этапе кропа
    els.restartBtnCrop.addEventListener('click', resetAll);

    // Распознавание области
    els.extractBtn.addEventListener('click', async () => {
        if (!cropper) return;

        cropper.disable();
        els.workspaceWrapper.style.opacity = '0.5';
        els.extractBtn.disabled = true;
        els.cropButtons.style.display = 'none'; // скрываем кнопки на время распознавания

        els.statusText.style.display = 'block';
        els.progressContainer.style.display = 'block';
        els.progressBar.style.width = '0%';

        const cropData = cropper.getData();
        const scale = 2.5;
        const croppedCanvas = cropper.getCroppedCanvas({
            fillColor: '#fff',
            width: cropData.width * scale,
            height: cropData.height * scale
        });
        const processedImgUrl = croppedCanvas.toDataURL('image/jpeg', 1.0);

        try {
            const { data } = await Tesseract.recognize(
                processedImgUrl,
                'rus',
                {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            els.statusText.innerText = `Распознавание: ${Math.round(m.progress * 100)}%`;
                            els.progressBar.style.width = `${m.progress * 100}%`;
                        }
                    }
                }
            );

            els.statusText.style.display = 'none';
            els.progressContainer.style.display = 'none';

            let finalLines = [];
            let prevY1 = null;

            data.lines.forEach((line) => {
                if (line.confidence < 45) return;

                let text = line.text.trim().replace(/[|~_^{}\\]/g, '');
                if (!text) return;

                const y0 = line.bbox.y0;
                const y1 = line.bbox.y1;
                const lineHeight = y1 - y0;

                if (prevY1 !== null) {
                    const gap = y0 - prevY1;
                    if (gap > lineHeight * 0.6) {
                        finalLines.push('');
                    }
                }

                finalLines.push(text);
                prevY1 = y1;
            });

            const finalText = finalLines.join('\n')
                .split(/\n{2,}/)
                .map(p => p.replace(/\n/g, ' ').replace(/\s{2,}/g, ' ').trim())
                .join('\n\n')
                .trim();

            if (!finalText) {
                alert('Текст не найден или слишком низкого качества. Попробуйте выделить область точнее.');
                cropper.enable();
                els.workspaceWrapper.style.opacity = '1';
                els.cropButtons.style.display = 'flex';
                els.extractBtn.disabled = false;
                return;
            }

            els.textEditor.value = finalText;
            els.editorWrapper.style.display = 'flex';
            els.editorWrapper.scrollIntoView({ behavior: 'smooth' });

        } catch (error) {
            console.error(error);
            alert('Ошибка распознавания.');
            cropper.enable();
            els.workspaceWrapper.style.opacity = '1';
            els.cropButtons.style.display = 'flex';
            els.extractBtn.disabled = false;
        }
    });

    // Генерация финального изображения
    els.generateBtn.addEventListener('click', async () => {
        const finalString = els.textEditor.value.trim();
        if (!finalString) return;

        els.editorWrapper.style.display = 'none';
        els.workspaceWrapper.style.display = 'none';

        await generateFinalImage(finalString);
    });

    // Полный сброс к началу
    function resetAll() {
        els.resultWrapper.style.display = 'none';
        els.editorWrapper.style.display = 'none';
        els.workspaceWrapper.style.display = 'none';
        els.statusText.style.display = 'none';
        els.progressContainer.style.display = 'none';
        els.cropButtons.style.display = 'none';

        els.uploadArea.style.display = 'block';

        els.fileInput.value = '';
        els.textEditor.value = '';
        els.imageWorkspace.src = '';
        els.resultPreview.src = '';

        els.extractBtn.disabled = false;
        els.workspaceWrapper.style.opacity = '1';

        if (cropper) {
            cropper.destroy();
            cropper = null;
        }
    }

    // Обработчики для кнопок "Начать сначала" (везде)
    els.restartBtn.addEventListener('click', resetAll);
    document.getElementById('restart-btn-editor').addEventListener('click', resetAll);

    async function generateFinalImage(rawText) {
        await document.fonts.load('24px "Coverface_SE"');

        const width = 600;
        const padding = 22;
        const maxTextWidth = width - (padding * 2);

        const fontSizeStr = '32px "Coverface_SE"';
        ctx.font = fontSizeStr;
        const lineHeight = 34;

        let cleanText = rawText.trim();
        const paragraphs = cleanText.split('\n');
        const allLines = [];

        paragraphs.forEach(paragraph => {
            if (paragraph.trim() === '') {
                allLines.push('');
                return;
            }
            const words = paragraph.split(/\s+/);
            let currentLine = '';

            words.forEach((word, index) => {
                const testLine = currentLine + word + ' ';
                const metrics = ctx.measureText(testLine.trim());

                if (metrics.width > maxTextWidth && index > 0) {
                    allLines.push(currentLine.trim());
                    currentLine = word + ' ';
                } else {
                    currentLine = testLine;
                }
            });
            if (currentLine.trim() !== '') {
                allLines.push(currentLine.trim());
            }
        });

        const height = (allLines.length * lineHeight) + (padding * 2);

        els.canvas.width = width;
        els.canvas.height = height;

        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, width, height);

        ctx.fillStyle = '#000000';
        ctx.font = fontSizeStr;

        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';

        allLines.forEach((lineText, index) => {
            const y = padding + (index * lineHeight);
            if (lineText !== '') {
                ctx.fillText(lineText, padding, y);
            }
        });

        els.resultPreview.src = els.canvas.toDataURL('image/jpeg', 1.0);
        els.resultWrapper.style.display = 'flex';
    }

    // Обновлённый скачиватель: использует blob вместо data URL для совместимости с WebView
    els.downloadBtn.addEventListener('click', () => {
        els.canvas.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'extracted_text_600px.jpg';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }, 'image/jpeg', 1.0);
    });
</script>
</body>
</html>
